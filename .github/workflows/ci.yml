name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  python-and-dbt-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas boto3 kafka-python snowflake-connector-python pyspark great_expectations==0.18.21 dbt-core dbt-snowflake apache-airflow

      - name: Check Python syntax
        run: |
          python -m compileall scripts pyspark great_expectations airflow

      - name: Validate dbt project structure
        working-directory: dbt/healthcare_dbt
        run: |
          dbt deps || true
          dbt parse

      - name: Validate Airflow DAG import
        run: |
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          dag_file = Path("airflow/dags/healthcare_pipeline_dag.py")
          spec = importlib.util.spec_from_file_location("healthcare_pipeline_dag", dag_file)
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          print("Airflow DAG import successful")
          PY